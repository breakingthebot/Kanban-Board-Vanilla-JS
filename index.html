<!--
  index.html
  Defines the semantic application shell and status regions for the Kanban board.
  Connects to: src/main.js and src/styles/index.css.
  Created: 2026-06-18
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A lightweight Kanban board with persistent drag-and-drop cards."
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'none'"
    />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="./src/styles/index.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Project workspace</p>
        <h1>Kanban Board</h1>
        <p class="subtitle">Move work forward, one card at a time.</p>
      </div>
      <div class="header-actions">
        <button id="create-card" class="button button--primary" type="button">
          Create card
        </button>
        <button id="import-board" class="button button--secondary" type="button">
          Import board
        </button>
        <button id="export-board" class="button button--secondary" type="button">
          Export board
        </button>
        <button id="undo-board" class="button button--secondary" type="button">
          Undo
        </button>
        <button id="redo-board" class="button button--secondary" type="button">
          Redo
        </button>
        <button id="reset-board" class="button button--secondary" type="button">
          Reset board
        </button>
      </div>
    </header>

    <section class="board-toolbar" aria-label="Board search">
      <label class="search-field" for="board-search">Search cards</label>
      <div class="search-field__controls">
        <input
          id="board-search"
          class="search-field__input"
          type="search"
          name="search"
          placeholder="Search titles, descriptions, or labels"
          autocomplete="off"
        />
        <button id="clear-search" class="button button--secondary" type="button">
          Clear search
        </button>
      </div>
      <p
        id="search-summary"
        class="search-summary"
        role="status"
        aria-label="Board search"
        aria-live="polite"
      ></p>
    </section>

    <main>
      <p id="board-status" class="status" role="status" aria-live="polite">
        Loading board…
      </p>
      <section id="board" class="board" aria-label="Project Kanban board"></section>
    </main>

    <dialog id="card-dialog" class="dialog" aria-labelledby="card-dialog-title">
      <form class="card-form" method="dialog" novalidate>
        <div class="dialog__header">
          <h2 id="card-dialog-title">Create card</h2>
          <button id="cancel-card" class="icon-button" type="button" aria-label="Close">
            ×
          </button>
        </div>

        <label for="card-title">Title</label>
        <input id="card-title" name="title" type="text" required />

        <label for="card-description">Description</label>
        <textarea id="card-description" name="description" rows="4"></textarea>

        <label for="card-labels">Labels</label>
        <input
          id="card-labels"
          name="labels"
          type="text"
          placeholder="planning, scope, ui"
        />
        <p class="field-help">Separate labels with commas. Search matches labels too.</p>

        <label for="card-column">Column</label>
        <select id="card-column" name="column"></select>

        <p id="card-form-error" class="form-error" role="alert"></p>

        <div class="dialog__actions">
          <button id="delete-card" class="button button--danger" type="button" hidden>
            Delete
          </button>
          <button class="button button--primary" type="submit">Save card</button>
        </div>
      </form>
    </dialog>

    <dialog id="board-backup-dialog" class="dialog" aria-labelledby="board-backup-title">
      <form class="card-form" method="dialog" novalidate>
        <div class="dialog__header">
          <h2 id="board-backup-title">Import board backup</h2>
          <button
            id="cancel-board-backup"
            class="icon-button"
            type="button"
            aria-label="Close"
          >
            ×
          </button>
        </div>

        <label for="board-backup-data">Backup JSON</label>
        <textarea
          id="board-backup-data"
          name="backup"
          rows="12"
          spellcheck="false"
        ></textarea>

        <p class="backup-help">
          Paste a JSON export from this board to replace the current saved state.
        </p>

        <p id="board-backup-error" class="form-error" role="alert"></p>

        <div class="dialog__actions">
          <button id="choose-board-file" class="button button--secondary" type="button">
            Load file
          </button>
          <button class="button button--primary" type="submit">Import board</button>
        </div>
        <input
          id="board-backup-file"
          type="file"
          accept=".json,application/json"
          hidden
        />
      </form>
    </dialog>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
