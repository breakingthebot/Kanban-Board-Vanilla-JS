# .github/workflows/ci.yml
# Runs syntax, unit, browser, responsive, and accessibility checks for repository changes.
# Connects to: package scripts, Playwright configuration, source modules, and tests.
# Created: 2026-06-18

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js 22
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser and accessibility tests
        run: npm run test:e2e
