# .github/workflows/ci.yml
# Runs deterministic syntax and unit-test checks for every branch update and pull request.
# Connects to: package.json, package-lock.json, source modules, and tests.
# Created: 2026-06-18

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js 22
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
